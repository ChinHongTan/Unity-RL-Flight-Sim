behaviors:
  PlaneAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: constant
      epsilon_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 3000000
    time_horizon: 128
    summary_freq: 5000
    keep_checkpoints: 10
environment_parameters:
  angle_range:
    curriculum:
      - name: ForwardCone
        completion_criteria:
          measure: reward
          behavior: PlaneAgent
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 2.0
          require_reset: true
        value: 30.0
      - name: WideCone
        completion_criteria:
          measure: reward
          behavior: PlaneAgent
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 2.0
          require_reset: true
        value: 90.0
      - name: VeryWideCone
        completion_criteria:
          measure: reward
          behavior: PlaneAgent
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 2.0
          require_reset: true
        value: 135.0
      - name: FullCircle
        value: 180.0
  height_range:
    curriculum:
      - name: Flat
        completion_criteria:
          measure: reward
          behavior: PlaneAgent
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 3.0
          require_reset: true
        value: 15.0
      - name: SmallClimbs
        completion_criteria:
          measure: reward
          behavior: PlaneAgent
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 3.0
          require_reset: true
        value: 30.0
      - name: FullVertical
        value: 60.0
  grounded_prob:
    curriculum:
      - name: GroundedRare
        completion_criteria:
          measure: reward
          behavior: PlaneAgent
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 4.0
          require_reset: true
        value: 0.3
      - name: GroundedCommon
        completion_criteria:
          measure: reward
          behavior: PlaneAgent
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 4.0
          require_reset: true
        value: 0.6
      - name: GroundedMost
        value: 0.7