behaviors:
  PlaneAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: constant
      epsilon_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 3000000
    time_horizon: 128
    summary_freq: 5000
    keep_checkpoints: 10
environment_parameters:
  angle_range:
    curriculum:
      - name: ForwardCone
        completion_criteria: &crit
          measure: progress
          behavior: PlaneAgent
          threshold: 0.1
          require_reset: true
        value: 30.0
      - name: WideCone
        completion_criteria:
          <<: *crit
          threshold: 0.3
        value: 90.0
      - name: VeryWideCone
        completion_criteria:
          <<: *crit
          threshold: 0.5
        value: 135.0
      - name: FullCircle
        value: 180.0
  height_range:
    curriculum:
      - name: Flat
        completion_criteria:
          <<: *crit
          threshold: 0.15
        value: 15.0
      - name: SmallClimbs
        completion_criteria:
          <<: *crit
          threshold: 0.35
        value: 30.0
      - name: FullVertical
        value: 60.0
  spawn_cone:
    curriculum:
      - name: NarrowCone
        completion_criteria:
          <<: *crit
          threshold: 0.2
        value: 15
      - name: MediumCone
        completion_criteria:
          <<: *crit
          threshold: 0.4
        value: 30
      - name: WideCone
        value: 45
  spawn_dist:
    curriculum:
      - name: ShortSpawn
        completion_criteria:
          <<: *crit
          threshold: 0.25
        value: 120
      - name: MediumSpawn
        completion_criteria:
          <<: *crit
          threshold: 0.45
        value: 160
      - name: LongSpawn
        value: 200